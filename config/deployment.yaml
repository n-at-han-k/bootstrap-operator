apiVersion: v1
kind: Namespace
metadata:
  name: bootstrap-operator-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bootstrap-operator
  namespace: bootstrap-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bootstrap-operator
  template:
    metadata:
      labels:
        app: bootstrap-operator
    spec:
      serviceAccountName: bootstrap-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: manager
        image: registry.cia.net/operators/bootstrap-operator:latest
        command: ["/manager"]
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
