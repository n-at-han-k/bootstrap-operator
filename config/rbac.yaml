apiVersion: v1
kind: ServiceAccount
metadata:
  name: bootstrap-operator
  namespace: bootstrap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bootstrap-operator
rules:
- apiGroups: ["bootstrap.cia.net"]
  resources: ["repoes"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["bootstrap.cia.net"]
  resources: ["repoes/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["bootstrap.cia.net"]
  resources: ["repoes/finalizers"]
  verbs: ["update"]
- apiGroups: ["bootstrap.cia.net"]
  resources: ["registries"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["bootstrap.cia.net"]
  resources: ["registries/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["bootstrap.cia.net"]
  resources: ["registries/finalizers"]
  verbs: ["update"]
- apiGroups: ["bootstrap.cia.net"]
  resources: ["images"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["bootstrap.cia.net"]
  resources: ["images/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["bootstrap.cia.net"]
  resources: ["images/finalizers"]
  verbs: ["update"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bootstrap-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bootstrap-operator
subjects:
- kind: ServiceAccount
  name: bootstrap-operator
  namespace: bootstrap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bootstrap-operator-leader-election
  namespace: bootstrap
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bootstrap-operator-leader-election
  namespace: bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bootstrap-operator-leader-election
subjects:
- kind: ServiceAccount
  name: bootstrap-operator
  namespace: bootstrap
