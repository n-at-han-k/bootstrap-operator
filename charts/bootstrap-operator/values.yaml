image:
  repository: ghcr.io/n-at-han-k/bootstrap-operator
  tag: latest
  pullPolicy: IfNotPresent

replicas: 1

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

leaderElect: true

serviceAccount:
  create: true
  name: bootstrap-operator

namespace: bootstrap-operator-system

crds:
  install: true
