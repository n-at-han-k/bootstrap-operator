apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "bootstrap-operator.fullname" . }}
  labels:
    {{- include "bootstrap-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["bootstrap.cia.net"]
    resources: ["repos"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["bootstrap.cia.net"]
    resources: ["repos/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["bootstrap.cia.net"]
    resources: ["repos/finalizers"]
    verbs: ["update"]
  - apiGroups: ["bootstrap.cia.net"]
    resources: ["registries"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["bootstrap.cia.net"]
    resources: ["registries/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["bootstrap.cia.net"]
    resources: ["registries/finalizers"]
    verbs: ["update"]
  - apiGroups: ["bootstrap.cia.net"]
    resources: ["images"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["bootstrap.cia.net"]
    resources: ["images/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["bootstrap.cia.net"]
    resources: ["images/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
