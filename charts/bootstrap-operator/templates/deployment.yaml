apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bootstrap-operator.fullname" . }}
  namespace: {{ include "bootstrap-operator.namespace" . }}
  labels:
    {{- include "bootstrap-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "bootstrap-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bootstrap-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "bootstrap-operator.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/manager"]
          args:
            {{- if .Values.leaderElect }}
            - --leader-elect
            {{- end }}
            - --health-probe-bind-address=:8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
